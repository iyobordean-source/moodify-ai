<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moodify — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-main: #0F1117;
      --bg-card: #161820;
      --bg-input: #0F1117;
      --bg-tab: #232735;
      --accent: #5865F2;
      --accent-hover: #4752C4;
      --accent-soft: rgba(88,101,242,0.12);
      --text-main: #E4E6EB;
      --text-muted: #9CA3AF;
      --text-faint: #4B5563;
      --border: rgba(255,255,255,0.08);
      --border-input: rgba(255,255,255,0.1);
      --error: #F87171;
    }

    body {
      min-height: 100vh;
      background: var(--bg-main);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-main);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.75rem;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.5px;
    }

    .logo-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
    }

    .card-heading {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .card-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
    }

    .error-banner {
      background: rgba(248,113,113,0.1);
      border: 0.5px solid rgba(248,113,113,0.25);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      color: var(--error);
      display: none;
      margin-bottom: 1rem;
    }

    .field-group { margin-bottom: 1rem; }

    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .field-input {
      width: 100%;
      background: var(--bg-input);
      border: 0.5px solid var(--border-input);
      border-radius: 10px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-main);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field-input::placeholder { color: var(--text-faint); }

    .field-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,101,242,0.12);
    }

    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .forgot-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-link:hover { color: #7983F5; }

    .error-msg {
      font-size: 12px;
      color: var(--error);
      margin-top: 5px;
      display: none;
    }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: all 0.2s;
    }

    .login-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .login-btn:active { transform: translateY(0); }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.25rem 0;
    }

    .divider-line {
      flex: 1;
      height: 0.5px;
      background: rgba(255,255,255,0.07);
    }

    .divider-text {
      font-size: 12px;
      color: var(--text-faint);
    }

    .google-btn {
      width: 100%;
      background: transparent;
      border: 0.5px solid var(--border-input);
      border-radius: 10px;
      padding: 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .google-btn:hover {
      border-color: rgba(255,255,255,0.2);
      color: var(--text-main);
      background: rgba(255,255,255,0.03);
    }

    .signup-text {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 1.25rem;
    }

    .signup-link {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
    }

    .signup-link:hover { color: #7983F5; }
  </style>
</head>
<body>

  <div class="login-container">

    <div class="logo-area">
      <div class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M9 18V5l12-2v13" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="6" cy="18" r="3" stroke="white" stroke-width="1.8"/>
          <circle cx="18" cy="16" r="3" stroke="white" stroke-width="1.8"/>
        </svg>
      </div>
      <div class="logo-text">Moodify</div>
      <div class="logo-sub">Welcome back</div>
    </div>

    <div class="card">

      <div class="card-heading">Sign in</div>
      <div class="card-sub">Continue to your Moodify account</div>

      <div class="error-banner" id="errorBanner">
        Incorrect email or password. Try again.
      </div>

      <div class="field-group">
        <label class="field-label">Email address</label>
        <input type="email" class="field-input" id="emailInput" placeholder="dean@email.com" />
        <div class="error-msg" id="emailError">Please enter a valid email</div>
      </div>

      <div class="field-group">
        <div class="field-row">
          <label class="field-label" style="margin-bottom:0">Password</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <input type="password" class="field-input" id="passwordInput" placeholder="Your password" style="margin-top:6px" />
        <div class="error-msg" id="passwordError">Please enter your password</div>
      </div>

      <button class="login-btn" id="loginBtn" onclick="handleLogin()">
        Sign in
      </button>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or</span>
        <div class="divider-line"></div>
      </div>

      <button class="google-btn">
        <svg width="16" height="16" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <p class="signup-text">
        Don't have an account? <a class="signup-link" href="signup.html">Sign up free</a>
      </p>

    </div>
  </div>

  <script>
    function showError(id, show) {
      document.getElementById(id).style.display = show ? 'block' : 'none';
    }

    function handleLogin() {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      let valid = true;

      if (!email || !email.includes('@')) { showError('emailError', true); valid = false; }
      else showError('emailError', false);

      if (!password) { showError('passwordError', true); valid = false; }
      else showError('passwordError', false);

      if (!valid) return;

      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      document.getElementById('errorBanner').style.display = 'none';

      // ─── CONNECT FIREBASE HERE ───────────────────────────
      // firebase.auth()
      //   .signInWithEmailAndPassword(email, password)
      //   .then((userCred) => {
      //     if (!userCred.user.emailVerified) {
      //       document.getElementById('errorBanner').textContent =
      //         'Please verify your email first.';
      //       document.getElementById('errorBanner').style.display = 'block';
      //       btn.textContent = 'Sign in';
      //       btn.disabled = false;
      //       return;
      //     }
      //     window.location.href = '../../index.html'; // redirect to home
      //   })
      //   .catch((err) => {
      //     document.getElementById('errorBanner').style.display = 'block';
      //     btn.textContent = 'Sign in';
      //     btn.disabled = false;
      //   });
      // ─────────────────────────────────────────────────────

      // Remove this timeout once Firebase is connected 👇
      setTimeout(() => {
        btn.textContent = 'Sign in';
        btn.disabled = false;
        document.getElementById('errorBanner').style.display = 'block';
      }, 1500);
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>

</body>
</html>
